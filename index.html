<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Release Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a2e; }

  header {
    background: #1a1a2e;
    color: white;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  header h1 { font-size: 1.3rem; font-weight: 600; letter-spacing: 0.5px; }
  header span { font-size: 0.8rem; color: #8892b0; }

  .container { max-width: 1100px; margin: 32px auto; padding: 0 20px; }

  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .top-bar h2 { font-size: 1rem; color: #555; font-weight: 500; }

  .btn {
    background: #2563eb; color: white; border: none;
    padding: 9px 18px; border-radius: 6px; cursor: pointer;
    font-size: 0.9rem; font-weight: 500; transition: background 0.2s;
  }
  .btn:hover { background: #1d4ed8; }
  .btn.secondary { background: #e2e8f0; color: #1a1a2e; }
  .btn.secondary:hover { background: #cbd5e1; }

  /* Summary */
  .summary-bar { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .summary-pill {
    background: white; border-radius: 8px; padding: 10px 18px;
    font-size: 0.85rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    display: flex; align-items: center; gap: 8px;
  }
  .summary-pill .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.green { background: #16a34a; }
  .dot.amber { background: #d97706; }
  .dot.red { background: #dc2626; }
  .dot.gray { background: #6b7280; }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }

  .card {
    background: white; border-radius: 10px; padding: 22px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    border-left: 4px solid #e2e8f0;
    transition: box-shadow 0.2s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .card.up-to-date { border-left-color: #16a34a; }
  .card.update-available { border-left-color: #d97706; }
  .card.critical { border-left-color: #dc2626; }
  .card.unknown { border-left-color: #6b7280; }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .card-name { font-size: 1.05rem; font-weight: 700; color: #1a1a2e; }

  .badge {
    font-size: 0.72rem; font-weight: 700; padding: 3px 10px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;
    border: none; font-family: inherit;
  }
  .badge.up-to-date { background: #dcfce7; color: #15803d; }
  .badge.update-available { background: #fef3c7; color: #b45309; }
  .badge.critical { background: #fee2e2; color: #b91c1c; }
  .badge.unknown { background: #f1f5f9; color: #64748b; }

  /* Status dropdown */
  .status-select {
    font-size: 0.72rem; font-weight: 700; padding: 3px 10px;
    border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
    border: 2px solid #2563eb; background: white; cursor: pointer;
    font-family: inherit; outline: none;
  }

  /* Inline fields */
  .fields { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }

  .field-row { display: flex; flex-direction: column; gap: 3px; }
  .field-label {
    font-size: 0.75rem; font-weight: 700; color: #64748b;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .field-display {
    font-size: 0.88rem; color: #334155; min-height: 24px;
    padding: 4px 6px; border-radius: 5px; cursor: pointer;
    border: 1px solid transparent; transition: border 0.15s, background 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .field-display:hover { border-color: #cbd5e1; background: #f8fafc; }
  .field-display.empty { color: #94a3b8; font-style: italic; }
  .field-display a { color: #2563eb; text-decoration: none; font-size: 0.88rem; }
  .field-display a:hover { text-decoration: underline; }
  .edit-icon { font-size: 0.7rem; color: #94a3b8; flex-shrink: 0; }

  .field-input {
    font-size: 0.88rem; padding: 5px 8px; border: 1px solid #2563eb;
    border-radius: 5px; outline: none; width: 100%; font-family: inherit;
    color: #1a1a2e;
  }
  .field-input:focus { box-shadow: 0 0 0 2px #bfdbfe; }

  .field-hint { font-size: 0.73rem; color: #94a3b8; margin-top: 1px; }

  /* Card footer */
  .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 12px; border-top: 1px solid #f1f5f9; }
  .card-actions { display: flex; gap: 6px; }

  .icon-btn {
    background: none; border: 1px solid #e2e8f0; border-radius: 5px;
    padding: 4px 10px; font-size: 0.78rem; cursor: pointer; color: #555;
    transition: background 0.15s;
  }
  .icon-btn:hover { background: #f1f5f9; }
  .icon-btn.danger { color: #dc2626; }
  .icon-btn.danger:hover { background: #fef2f2; border-color: #fecaca; }

  .last-checked { font-size: 0.75rem; color: #94a3b8; }

  /* Changelog link */
  .changelog-link { font-size: 0.82rem; margin-bottom: 14px; }
  .changelog-link a { color: #2563eb; text-decoration: none; font-weight: 500; }
  .changelog-link a:hover { text-decoration: underline; }

  /* Add/Edit Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: white; border-radius: 10px; padding: 28px;
    width: 460px; max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal h3 { font-size: 1.1rem; margin-bottom: 20px; color: #1a1a2e; }
  .mfield { margin-bottom: 16px; }
  .mfield label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #444; }
  .mfield input {
    width: 100%; padding: 9px 12px; border: 1px solid #d1d5db;
    border-radius: 6px; font-size: 0.9rem; outline: none; transition: border 0.2s;
    font-family: inherit;
  }
  .mfield input:focus { border-color: #2563eb; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }

  .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
  .empty-state p { margin-bottom: 16px; font-size: 1rem; }

  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid #e2e8f0; border-top-color: #2563eb;
    border-radius: 50%; animation: spin 0.6s linear infinite;
    margin-right: 4px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>🖥️ POS Release Tracker</h1>
  <span id="last-refresh">Never refreshed</span>
</header>

<div class="container">
  <div class="summary-bar" id="summary-bar"></div>

  <div class="top-bar">
    <h2 id="program-count">0 programs tracked</h2>
    <div style="display:flex;gap:10px;">
      <button class="btn secondary" onclick="refreshAll()">↻ Check All URLs</button>
      <button class="btn" onclick="openAddModal()">+ Add Program</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty-state" id="empty" style="display:none;">
    <p>No programs tracked yet.</p>
    <button class="btn" onclick="openAddModal()">+ Add your first program</button>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Add POS Program</h3>
    <div class="mfield">
      <label>Program Name</label>
      <input type="text" id="f-name" placeholder="e.g. Tekmetric">
    </div>
    <div class="mfield">
      <label>Changelog / Release Notes URL</label>
      <input type="url" id="f-url" placeholder="https://...">
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveProgram()">Add Program</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'pos_tracker_v2';
let programs = [];
let activeInput = null; // tracks which field is being edited

function load() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    programs = d ? JSON.parse(d) : [];
  } catch { programs = []; }
  if (programs.length === 0) {
    programs = [{
      id: Date.now(),
      name: 'Tekmetric',
      url: 'https://support.tekmetric.com/hc/en-us/articles/360041785434-Release-Date-Feature-Notes',
      status: 'unknown',
      updateDate: '',
      featureLink: '',
      notes: '',
      lastChecked: null,
      loading: false
    }];
    save();
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(programs));
}

// ── Inline field editing ──────────────────────────────────────────────
function startEdit(id, field, el) {
  // commit any open edit first
  if (activeInput) commitEdit();

  const p = programs.find(x => x.id === id);
  if (!p) return;

  const val = p[field] || '';
  const isUrl = field === 'featureLink';

  const input = document.createElement('input');
  input.type = isUrl ? 'url' : 'text';
  input.className = 'field-input';
  input.value = val;
  input.placeholder = isUrl ? 'https://...' : (field === 'updateDate' ? 'e.g. Feb 18, 2025' : 'Brief description...');

  activeInput = { id, field, el, input };

  el.replaceWith(input);
  input.focus();
  input.select();

  input.addEventListener('blur', commitEdit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commitEdit(); }
    if (e.key === 'Escape') { cancelEdit(); }
  });
}

function commitEdit() {
  if (!activeInput) return;
  const { id, field, input } = activeInput;
  const p = programs.find(x => x.id === id);
  if (p) {
    p[field] = input.value.trim();
    save();
  }
  activeInput = null;
  render();
}

function cancelEdit() {
  activeInput = null;
  render();
}

// ── Status cycling ────────────────────────────────────────────────────
function cycleStatus(id) {
  const p = programs.find(x => x.id === id);
  if (!p) return;
  const order = ['unknown', 'up-to-date', 'update-available', 'critical'];
  const idx = order.indexOf(p.status || 'unknown');
  p.status = order[(idx + 1) % order.length];
  save();
  render();
}

// ── Add modal ─────────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('f-name').value = '';
  document.getElementById('f-url').value = '';
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

function saveProgram() {
  const name = document.getElementById('f-name').value.trim();
  const url = document.getElementById('f-url').value.trim();
  if (!name || !url) { alert('Please enter a name and URL.'); return; }
  programs.push({
    id: Date.now(), name, url, status: 'unknown',
    updateDate: '', featureLink: '', notes: '',
    lastChecked: null, loading: false
  });
  save();
  closeModal();
  render();
}

function deleteProgram(id) {
  if (!confirm('Remove this program from tracking?')) return;
  programs = programs.filter(x => x.id !== id);
  save();
  render();
}

// ── URL reachability check ────────────────────────────────────────────
async function fetchInfo(p) {
  p.lastChecked = new Date().toISOString();
  try {
    await fetch(p.url, { method: 'HEAD', mode: 'no-cors' });
    p.reachable = true;
  } catch { p.reachable = false; }
  save();
}

async function refreshOne(id) {
  const p = programs.find(x => x.id === id);
  if (!p) return;
  p.loading = true; render();
  await fetchInfo(p);
  p.loading = false; render();
}

async function refreshAll() {
  programs.forEach(p => p.loading = true); render();
  await Promise.all(programs.map(fetchInfo));
  programs.forEach(p => p.loading = false);
  document.getElementById('last-refresh').textContent = 'Last checked: ' + new Date().toLocaleTimeString();
  render();
}

// ── Helpers ───────────────────────────────────────────────────────────
function badgeLabel(s) {
  return { 'up-to-date': 'Up to Date', 'update-available': 'Update Available', 'critical': 'Critical', 'unknown': 'Unknown' }[s] || 'Unknown';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render ────────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  document.getElementById('program-count').textContent =
    programs.length + ' program' + (programs.length !== 1 ? 's' : '') + ' tracked';

  // Summary
  const counts = { 'up-to-date': 0, 'update-available': 0, 'critical': 0, 'unknown': 0 };
  programs.forEach(p => counts[p.status || 'unknown']++);
  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-pill"><span class="dot green"></span> Up to Date: <strong>${counts['up-to-date']}</strong></div>
    <div class="summary-pill"><span class="dot amber"></span> Update Available: <strong>${counts['update-available']}</strong></div>
    <div class="summary-pill"><span class="dot red"></span> Critical: <strong>${counts['critical']}</strong></div>
    <div class="summary-pill"><span class="dot gray"></span> Unknown: <strong>${counts['unknown']}</strong></div>`;

  if (programs.length === 0) {
    grid.innerHTML = ''; empty.style.display = 'block'; return;
  }
  empty.style.display = 'none';

  grid.innerHTML = programs.map(p => {
    const sc = p.status || 'unknown';
    const checked = p.lastChecked ? new Date(p.lastChecked).toLocaleString() : 'Never';

    const dateDisplay = p.updateDate
      ? `<span>${esc(p.updateDate)}</span><span class="edit-icon">✎</span>`
      : `<span class="empty">Click to add date</span><span class="edit-icon">✎</span>`;

    const linkDisplay = p.featureLink
      ? `<a href="${esc(p.featureLink)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">View feature ↗</a><span class="edit-icon">✎</span>`
      : `<span class="empty">Click to add feature link</span><span class="edit-icon">✎</span>`;

    const notesDisplay = p.notes
      ? `<span>${esc(p.notes)}</span><span class="edit-icon">✎</span>`
      : `<span class="empty">Click to add notes</span><span class="edit-icon">✎</span>`;

    return `
    <div class="card ${sc}">
      <div class="card-header">
        <div class="card-name">${esc(p.name)}</div>
        <button class="badge ${sc}" onclick="cycleStatus(${p.id})" title="Click to change status">${badgeLabel(sc)}</button>
      </div>

      <div class="changelog-link">
        🔗 <a href="${esc(p.url)}" target="_blank" rel="noopener">Changelog / Release Notes ↗</a>
      </div>

      <div class="fields">
        <div class="field-row">
          <div class="field-label">Most Recent Update Date</div>
          <div class="field-display ${p.updateDate ? '' : 'empty'}"
               onclick="startEdit(${p.id}, 'updateDate', this)">${dateDisplay}</div>
        </div>
        <div class="field-row">
          <div class="field-label">Feature Link</div>
          <div class="field-display ${p.featureLink ? '' : 'empty'}"
               onclick="startEdit(${p.id}, 'featureLink', this)">${linkDisplay}</div>
        </div>
        <div class="field-row">
          <div class="field-label">Notes</div>
          <div class="field-display ${p.notes ? '' : 'empty'}"
               onclick="startEdit(${p.id}, 'notes', this)">${notesDisplay}</div>
        </div>
      </div>

      <div class="card-footer">
        <div class="card-actions">
          ${p.loading
            ? `<span><span class="spinner"></span> Checking...</span>`
            : `<button class="icon-btn" onclick="refreshOne(${p.id})">↻ Check URL</button>`}
          <button class="icon-btn danger" onclick="deleteProgram(${p.id})">✕ Remove</button>
        </div>
        <div class="last-checked">Checked: ${checked}</div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

load();
render();
</script>
</body>
</html>
